<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bellcom × Empowered — Choose</title>
  <style>
    body{font-family:system-ui,Segoe UI,Roboto,Arial;background:#0d0f12;color:#e6eef8;display:flex;align-items:center;justify-content:center;height:100vh;margin:0}
    .box{background:#111318;padding:28px;border-radius:12px;border:1px solid rgba(255,255,255,0.04);width:360px}
    h1{font-size:18px;margin-bottom:8px}
    p{color:#9aa3b2;font-size:13px;margin-bottom:16px}
    .row{display:flex;gap:10px}
    .btn{flex:1;padding:12px;border-radius:10px;border:none;cursor:pointer;font-weight:700}
    .btn.chat{background:#2b3a70;color:#dfe9ff}
    .btn.admin{background:#0b1220;color:#8fb3ff;border:1px solid rgba(79,127,255,0.12)}
    .note{font-size:12px;color:#6b7480;margin-top:12px}
  </style>
</head>
<body>
  <div class="box">
    <h1>Welcome to Empowered Assistant</h1>
    <p>Choose how you want to continue. Use <strong>Chat</strong> to ask HR questions or <strong>Admin</strong> to view stored chat sessions.</p>
    <div class="row">
      <button class="btn chat" id="chatBtn">Chat</button>
      <button class="btn admin" id="adminBtn">Admin</button>
    </div>
    <div class="note">Admin requires admin credentials on the next screen.</div>
  </div>
  <script>
    document.getElementById('chatBtn').addEventListener('click', ()=>{ location.href = '/belltekniare_1.html'; });
    document.getElementById('adminBtn').addEventListener('click', ()=>{ location.href = '/admin.html'; });
  </script>
</body>
</html>
